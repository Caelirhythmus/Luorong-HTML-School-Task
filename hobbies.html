<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兴趣爱好 · 罗容</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid #333;
            padding-bottom: 1rem;
        }

        .nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .nav a:hover,
        .nav a.active {
            color: #fff;
        }

        /* 顶部装饰网格 */
        .deco-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .grid-box {
            border: 2px solid #333;
            background-color: #0a0a0a;
            border-radius: 4px;
            min-height: 80px;
        }

        .grid-center {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }

        .grid-center .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #555;
            object-fit: cover;
        }

        /* 内容区域 */
        .content {
            border: 2px solid #333;
            background-color: #0a0a0a;
            border-radius: 4px;
            padding: 2.5rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 2.5rem;
            text-align: center;
            letter-spacing: 4px;
        }

        .page-title span {
            color: #666;
        }

        .hobby-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .hobby-card {
            border: 1px solid #333;
            padding: 2rem;
            border-radius: 4px;
            background-color: #0d0d0d;
            text-align: center;
            transition: border-color 0.3s;
        }

        .hobby-card:hover {
            border-color: #666;
        }

        .hobby-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hobby-card h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            color: #fff;
        }

        .hobby-card p {
            font-size: 0.95rem;
            color: #999;
            line-height: 1.8;
        }

        .quote-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #0d0d0d;
            text-align: center;
        }

        .quote-box p {
            color: #888;
            font-size: 0.95rem;
            line-height: 1.8;
        }

        @media (max-width: 600px) {
            .hobby-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="nav">
            <a href="index.html">首页</a>
            <a href="about.html">关于我</a>
            <a href="hobbies.html" class="active">兴趣爱好</a>
        </nav>

        <!-- 顶部装饰网格 -->
        <div class="deco-grid">
            <div class="grid-box"></div>
            <div class="grid-box grid-center">
                <img src="profile-photo.jpg" alt="罗容" class="avatar">
            </div>
            <div class="grid-box"></div>
        </div>

        <!-- 内容区 -->
        <div class="content">
            <h1 class="page-title">兴趣 <span>爱好</span></h1>

            <div class="hobby-grid">
                <div class="hobby-card">
                    <div class="hobby-icon">丝竹之乐</div>
                    <p>
                        音乐是我生活中不可或缺的一部分。<br>
                        无论是在学习时放松心情，<br>
                        还是在闲暇时享受旋律，<br>
                        音乐总能带给我力量。
                    </p>
                </div>

                <div class="hobby-card">
                    <div class="hobby-icon">键鼠之娱</div>
                    <p>
                        游戏是我最大的爱好之一。<br>
                        在虚拟世界中探索冒险，<br>
                        与朋友一起组队开黑，<br>
                        享受竞技与合作带来的乐趣。
                    </p>
                </div>
            </div>

            <div class="quote-box">
                <p>
                    在熟人面前我比较乐观活泼 ——<br>
                    这就是我，一个热爱音乐与游戏的普通人。
                </p>
            </div>
        </div>
    </div>
</body>
</html>
